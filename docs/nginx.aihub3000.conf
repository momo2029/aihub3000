# AIHub3000 Nginx Configuration
# Domain: aihub3000.3198.net
# Server: appcn1 (123.57.181.97)

server {
    listen 80;
    server_name aihub3000.3198.net;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aihub3000.3198.net;

    # SSL Certificate (使用 Let's Encrypt 或其他证书)
    ssl_certificate /etc/nginx/ssl/aihub3000.3198.net/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/aihub3000.3198.net/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/aihub3000.access.log;
    error_log /var/log/nginx/aihub3000.error.log;

    # API Proxy
    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8100/health;
        access_log off;
    }

    # API docs (only in development)
    location /docs {
        proxy_pass http://127.0.0.1:8100/docs;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8100/redoc;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8100/openapi.json;
    }
}