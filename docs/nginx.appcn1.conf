# AIHub3000 Nginx 配置 (部署在 appcn1)
# 负载均衡到本地和 appcn2 的蓝绿实例

upstream aihub3000_backend {
    # appcn1 本地蓝绿实例
    server 127.0.0.1:8100 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8101 max_fails=3 fail_timeout=30s;

    # appcn2 蓝绿实例 (待添加第二台服务器后取消注释)
    # server <appcn2_ip>:8100 max_fails=3 fail_timeout=30s;
    # server <appcn2_ip>:8101 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

server {
    listen 80;
    server_name aihub3000.3198.net;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aihub3000.3198.net;

    ssl_certificate /etc/letsencrypt/live/aihub3000.3198.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aihub3000.3198.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    access_log /var/log/nginx/aihub3000.access.log;
    error_log /var/log/nginx/aihub3000.error.log;

    location / {
        proxy_pass http://aihub3000_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location /health {
        proxy_pass http://aihub3000_backend/health;
        access_log off;
    }
}
