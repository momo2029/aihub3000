name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: crpi-1e1v7t6udr8xqx6k.cn-beijing.personal.cr.aliyuncs.com
  NAMESPACE: cobola
  IMAGE_NAME: aihub3000

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ github.event.head_commit.message }}
          generate_release_notes: false

  deploy-volc1:
    runs-on: ubuntu-latest
    needs: build
    environment: volc1
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_VOLC1 }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY_DEPLOY }}
          timeout: 60s
          command_timeout: 5m
          script: |
            cd /opt/aihub3000
            docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            docker compose pull
            docker compose up -d
            sleep 10
            docker ps --filter name=aihub3000 --format "table {{.Names}}\t{{.Status}}"

  deploy-volc2:
    runs-on: ubuntu-latest
    needs: deploy-volc1
    environment: volc2
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST_VOLC2 }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY_DEPLOY }}
          timeout: 60s
          command_timeout: 5m
          script: |
            cd /opt/aihub3000
            docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            docker compose pull
            docker compose up -d
            sleep 10
            docker ps --filter name=aihub3000 --format "table {{.Names}}\t{{.Status}}"